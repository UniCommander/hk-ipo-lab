<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO作战参谋部 | HK-IPO-Lab</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>IPO 作战参谋部</h1>
        <nav id="tabs">
            <button class="tab active" data-tab="dashboard">宏观仪表盘</button>
            <button class="tab" data-tab="projects">项目笔记</button>
            <button class="tab" data-tab="sectors">赛道图谱</button>
        </nav>
    </header>

    <main>
        <!-- 宏观仪表盘 -->
        <section id="tab-dashboard" class="tab-content active">
            <div class="macro-grid">
                <div class="macro-card">
                    <h3>美联储降息概率</h3>
                    <div class="value" id="fed-prob">--</div>
                    <div class="trend" id="fed-trend">--</div>
                </div>
                <div class="macro-card">
                    <h3>10Y美债收益率</h3>
                    <div class="value" id="us10y">--</div>
                    <div class="trend" id="us10y-trend">--</div>
                </div>
                <div class="macro-card">
                    <h3>USD/HKD</h3>
                    <div class="value" id="usdhkd">--</div>
                    <div class="trend" id="usdhkd-trend">--</div>
                </div>
                <div class="macro-card">
                    <h3>恒生科技PE</h3>
                    <div class="value" id="hstech-pe">--</div>
                    <div class="trend" id="hstech-trend">--</div>
                </div>
                <div class="macro-card">
                    <h3>港股IPO月融资额</h3>
                    <div class="value" id="ipo-volume">--</div>
                    <div class="trend" id="ipo-trend">--</div>
                </div>
                <div class="macro-card">
                    <h3>中美摩擦信号</h3>
                    <div class="value" id="uscn-tension">--</div>
                    <div class="trend" id="uscn-trend">--</div>
                </div>
            </div>
            <div class="macro-summary">
                <h3>综合评分</h3>
                <div class="score" id="macro-score">--/10</div>
                <div id="macro-positive"></div>
                <div id="macro-negative"></div>
                <div id="macro-guidance"></div>
            </div>
        </section>

        <!-- 项目笔记 -->
        <section id="tab-projects" class="tab-content">
            <div class="toolbar">
                <select id="filter-sector">
                    <option value="all">全部赛道</option>
                </select>
                <select id="filter-rating">
                    <option value="all">全部评级</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                </select>
                <select id="sort-by">
                    <option value="date">按日期</option>
                    <option value="rating">按评级</option>
                    <option value="name">按名称</option>
                </select>
                <input type="text" id="search-box" placeholder="搜索公司名...">
                <button id="btn-compare" disabled>对比选中 (最多3个)</button>
                <button id="btn-export">导出报告</button>
            </div>
            <div id="project-list"></div>
            <div id="compare-panel" style="display:none;">
                <h3>对比视图</h3>
                <div id="compare-table"></div>
                <button id="btn-close-compare">关闭对比</button>
            </div>
        </section>

        <!-- 赛道图谱 -->
        <section id="tab-sectors" class="tab-content">
            <div id="sector-map"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
